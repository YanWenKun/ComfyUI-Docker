name: Publish 'base-cu130-pt211-cache' to Docker Hub

on: 
  workflow_dispatch: # Can be manually triggered
  schedule: # Runs on every 1st & 16th day of the month, 05:00 UTC
    - cron: '0 5 1,16 * *'
  push: 
    branches: [ main ]
    paths-ignore:
      - '**'
      - '!base-cu130-pt211-cache/Dockerfile'
      - '!base-cu130-pt211-cache/builder-scripts/**'
      - '!.github/workflows/build-base-cu130-pt211-cache.yml'

jobs:

  build-publish-base-cu130-pt211-cache:
    environment: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      -
        name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      -
        name: Maximize build disk space
        uses: easimon/maximize-build-space@master
        with:
          overprovision-lvm: 'true'
          remove-android: 'true'
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          swap-size-mb: 512
      # Ugly workaround, checkout first then move docker data-root to the same directory
      # (e.g. /home/runner/work/ComfyUI-Docker/ComfyUI-Docker)
      # which has plenty of space after last step.
      -
        name: Git checkout
        uses: actions/checkout@v6
      -
        name: Move Docker data-root to WORKDIR
        run: |
          WORKDIR=$(pwd)
          echo "WORKDIR=${WORKDIR}"

          sudo systemctl stop docker

          sudo mkdir -p ${WORKDIR}/docker-data
          sudo mkdir -p /etc/docker

          cat /etc/docker/daemon.json || true

          sudo tee /etc/docker/daemon.json > /dev/null <<EOF
          {
            "data-root": "${WORKDIR}/docker-data"
          }
          EOF

          sudo systemctl restart docker
          docker info | grep "Docker Root Dir"

          df -h
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESSTOKEN }}
      -
        name: Build and push 'base-cu130-pt211-cache'
        uses: docker/build-push-action@v6
        with:
          context: ./base-cu130-pt211-cache
          file: ./base-cu130-pt211-cache/Dockerfile
          build-args: |
            USING_GITHUB_ACTIONS=true
          tags: |
            yanwk/comfyui-boot:base-cu130-pt211-cache
            yanwk/comfyui-boot:base-cu130-pt211-cache-${{ steps.date.outputs.date }}
          push: true
