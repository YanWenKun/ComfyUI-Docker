name: Publish 'rocm7' to Docker Hub

on: 
  workflow_dispatch: # Can be manually triggered
  push: 
    branches: [ main ]
    paths-ignore:
      - '**'
      - '!rocm7/Dockerfile'
      - '!rocm7/builder-scripts/**'
      - '!rocm7/runner-scripts/**'
      - '!.github/workflows/build-rocm7.yml'
      # Trigger when new ComfyUI version released
      - '!.github/current_comfyui_release.txt'

jobs:

  build-publish-rocm7:
    environment: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      -
        name: Maximize build disk space
        uses: easimon/maximize-build-space@master
        with:
          overprovision-lvm: 'true'
          remove-android: 'true'
          remove-dotnet: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          swap-size-mb: 512
      # Ugly workaround, checkout first then move docker data-root to the same directory
      # (e.g. /home/runner/work/ComfyUI-Docker/ComfyUI-Docker)
      # which has plenty of space after last step.
      -
        name: Git checkout
        uses: actions/checkout@v6
      -
        name: Move Docker data-root to WORKDIR
        run: |
          WORKDIR=$(pwd)
          echo "WORKDIR=${WORKDIR}"

          sudo systemctl stop docker

          sudo mkdir -p ${WORKDIR}/docker-data
          sudo mkdir -p /etc/docker

          cat /etc/docker/daemon.json || true

          sudo tee /etc/docker/daemon.json > /dev/null <<EOF
          {
            "data-root": "${WORKDIR}/docker-data"
          }
          EOF

          sudo systemctl restart docker
          docker info | grep "Docker Root Dir"

          df -h
      -
        name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESSTOKEN }}
      -
        name: Build and push 'rocm7'
        uses: docker/build-push-action@v6
        with:
          context: ./rocm7
          file: ./rocm7/Dockerfile
          build-args: |
            USING_GITHUB_ACTIONS=true
          tags: |
            yanwk/comfyui-boot:rocm7
            yanwk/comfyui-boot:rocm7-${{ steps.date.outputs.date }}
          push: true


  test-image-rocm7:
    needs: build-publish-rocm7
    runs-on: ubuntu-latest
    steps:
      - 
        name: Wait for image to be ready
        run: sleep 30s
      - 
        name: Pull image from Docker Hub
        run: docker pull docker.io/yanwk/comfyui-boot:rocm7
      - 
        name: Show 'rocm7' environment variables
        run: |
          docker run --rm \
            --name show-env \
            docker.io/yanwk/comfyui-boot:rocm7 \
            env
      - 
        name: Test 'rocm7'
        # Prevent CI from using Flash Attention (requires GPU)
        run: |
          docker run --rm \
            --name comfyui-quick-test \
            -e CLI_ARGS="--quick-test-for-ci --cpu" \
            docker.io/yanwk/comfyui-boot:rocm7 \
              bash -c 'pip uninstall -y flash_attn && bash /runner-scripts/entrypoint.sh'
