name: Publish 'base-cu130-slim-s2' to Docker Hub

on: 
  workflow_dispatch: # Can be manually triggered
  schedule: # Runs on every 1st & 16th day of the month, 05:00 UTC
    # - cron: '0 5 1,16 * *'
    - cron: '0 5 16 * *'
  push: 
    branches: [ main ]
    paths-ignore:
      - '**'
      - '!base-cu130-slim-s2/Dockerfile'
      - '!base-cu130-slim-s2/builder-scripts/**'
      - '!.github/workflows/build-base-cu130-slim-s2.yml'

jobs:

  build-publish-base-cu130-slim-s2:
    environment: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      -
        name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      -
        name: Git checkout
        uses: actions/checkout@v6
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESSTOKEN }}
      -
        name: Build and push 'base-cu130-slim-s2'
        uses: docker/build-push-action@v6
        with:
          context: ./base-cu130-slim-s2
          file: ./base-cu130-slim-s2/Dockerfile
          build-args: |
            USING_GITHUB_ACTIONS=true
          tags: |
            yanwk/comfyui-boot:base-cu130-slim-s2
            yanwk/comfyui-boot:base-cu130-slim-s2-${{ steps.date.outputs.date }}
          push: true
