name: Publish 'base-cu130-devel' to Docker Hub

on: 
  workflow_dispatch: # Can be manually triggered
  push: 
    branches: [ main ]
    paths-ignore:
      - '**'
      - '!base-cu130-devel/Dockerfile'
      - '!.github/workflows/build-base-cu130-devel.yml'

jobs:

  build-publish-base-cu130-devel:
    environment: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      -
        name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      -
        name: Git checkout
        uses: actions/checkout@v6
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESSTOKEN }}
      -
        name: Build and push 'base-cu130-devel'
        uses: docker/build-push-action@v6
        with:
          context: ./base-cu130-devel
          file: ./base-cu130-devel/Dockerfile
          build-args: |
            USING_GITHUB_ACTIONS=true
          tags: |
            yanwk/comfyui-boot:base-cu130-devel
            yanwk/comfyui-boot:base-cu130-devel-${{ steps.date.outputs.date }}
          push: true
