name: Publish 'base-rocm72-pt213' to Docker Hub

on: 
  workflow_dispatch: # Can be manually triggered
  push: 
    branches: [ main ]
    paths-ignore:
      - '**'
      - '!base-rocm72-pt213/Dockerfile'
      - '!.github/workflows/build-base-rocm72-pt213.yml'

jobs:

  build-publish-base-rocm72-pt213:
    environment: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      -
        name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
      -
        name: Git checkout
        uses: actions/checkout@v7
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESSTOKEN }}
      -
        name: Build and push 'base-rocm72-pt213'
        uses: docker/build-push-action@v7
        with:
          context: ./base-rocm72-pt213
          file: ./base-rocm72-pt213/Dockerfile
          build-args: |
            USING_GITHUB_ACTIONS=true
          tags: |
            yanwk/comfyui-boot:base-rocm72-pt213
            yanwk/comfyui-boot:base-rocm72-pt213-${{ steps.date.outputs.date }}
          push: true
